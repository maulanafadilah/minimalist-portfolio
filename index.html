<!doctype html>
<html lang="en">

    <link rel="icon" type="image/svg+xml" href="/favicon.png" />

    <meta

    />

    <!-- OG -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://maulanafadilah.me" />
    <meta property="og:title" content="Maulana Fadilah — Mobile Engineer" />

      property="og:description"
      content="I build mobile products people actually use. Currently shipping React Native at scale."
    />

    <!-- Twitter -->

    <meta name="twitter:title" content="Maulana Fadilah — Mobile Engineer" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Geist+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />

    <!-- Grain filter -->
    <svg
      xmlns="http://www.w3.org/2000/svg"
      style="position: absolute; width: 0; height: 0"
    >
      <defs>
        <filter id="grain">
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.65"
            numOctaves="3"
            stitchTiles="stitch"
          />
          <feColorMatrix type="saturate" values="0" />
          <feBlend in="SourceGraphic" mode="multiply" result="blend" />
          <feComposite in="blend" in2="SourceGraphic" operator="in" />
        </filter>
      </defs>
    </svg>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
